{% if page_obj.paginator.num_pages > 1 %}
<nav class="mt-4" aria-label="Paginación">
    <ul class="pagination justify-content-end mb-0">
        {% if page_obj.has_previous %}
        <li class="page-item"><a class="page-link" href="?page={{ page_obj.previous_page_number }}{% if busqueda %}&q={{ busqueda|urlencode }}{% endif %}">Anterior</a></li>
        {% endif %}
        <li class="page-item active"><span class="page-link">{{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span></li>
        {% if page_obj.has_next %}
        <li class="page-item"><a class="page-link" href="?page={{ page_obj.next_page_number }}{% if busqueda %}&q={{ busqueda|urlencode }}{% endif %}">Siguiente</a></li>
        {% endif %}
    </ul>
</nav>
{% endif %}
